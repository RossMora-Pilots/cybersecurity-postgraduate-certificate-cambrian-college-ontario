name: Markdown Lint
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: actionshub/markdownlint@v3
        with:
          files: |
            **/*.md
