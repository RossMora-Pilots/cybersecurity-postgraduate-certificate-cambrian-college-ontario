name: Gitleaks
permissions:
  contents: read
  pull-requests: read
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks (free binary — replaces gitleaks-action@v2 which requires GITLEAKS_LICENSE for orgs)
        run: |
          GL_VERSION="8.22.1"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar xzf gitleaks.tar.gz
          chmod +x gitleaks
      - name: Run gitleaks
        continue-on-error: true
        run: |
          ./gitleaks detect --no-git --redact --config=.gitleaks.toml --report-format=json --report-path=gitleaks-report.json || true
